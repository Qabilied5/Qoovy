<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qoovy</title>
<link rel="stylesheet" href="home.css">
</head>
<body>

<div class="container">

    <div class="left-side-menu">
        <div class="logo">Qoovy</div>

        <div class="menu">
            <a href="#">🏠 Home</a>
            <a href="#">🔍 Search</a>
            <a href="#">❤️ Favorites</a>
            <a href="#">🎵 Playlist</a>
            <a href="#">⚙️ Settings</a>
        </div>
    </div>

    <div class="home-qoovy">
        
        <div class="search-box">
            <input type="text" placeholder="Search songs, artists...">
        </div>

        <div class="section">
            <h3>🔥 Frequently Played</h3>
            <div class="card-list">
                <div class="card">
                    <div class="cover"></div>
                    <div class="title">Song Title</div>
                    <div class="artist">Artist Name</div>
                </div>
                <div class="card">
                    <div class="cover"></div>
                    <div class="title">Song Title</div>
                    <div class="artist">Artist Name</div>
                </div>
                <div class="card">
                    <div class="cover"></div>
                    <div class="title">Song Title</div>
                    <div class="artist">Artist Name</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>🎧 Recommended</h3>
            <div class="card-list">
                <div class="card">
                    <div class="cover"></div>
                    <div class="title">Song Title</div>
                    <div class="artist">Artist Name</div>
                </div>
                <div class="card">
                    <div class="cover"></div>
                    <div class="title">Song Title</div>
                    <div class="artist">Artist Name</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>🎶 Your Playlist</h3>
            <div class="card-list">
                <div class="card">
                    <div class="cover"></div>
                    <div class="title">My Playlist</div>
                    <div class="artist">20 songs</div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="player">
    <div>Now Playing: Song Title - Artist</div>
    <div class="controls">
        <button>⏮</button>
        <button>▶</button>
        <button>⏭</button>
    </div>
</div>

</body>
</html>
